version: '3.8'

services:
  # Backend API
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sonicbloom
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sonicbloom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MusicGen Worker (separate GPU container)
  worker:
    build: ./ml
    environment:
      - REDIS_URL=redis://redis:6379
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
    depends_on:
      - redis
    # GPU support (for local with nvidia-docker)
    # runtime: nvidia
    # Only enable if you have local GPU

volumes:
  postgres_data:
  redis_data:
